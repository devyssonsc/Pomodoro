<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro DSC</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="shortcut icon" href="img/Icon.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="container-header">
        <div class="none"></div>
        <div class="logo">
            <a href="index.html">
                <img src="img/Icon.png" alt="Logo Tomate">
                <h1>Pomodoro</h1>
            </a>
        </div>
        <div class="option-buttons">
            <button id="set-times-button">
                <i class="bi bi-gear-fill"></i>
                <img src="img/set-times.png" alt="Set Times" id="set-times">
            </button>
            
            <button id="definition-button">
                <i class="bi bi-question-lg"></i>
                <img src="img/definition.png" alt="What Is Pomodoro?" id="definition">
            </button>
            
        </div>
    </header>
    <main class="container-main">
        <div class="container">

            <div class="div-mute">
                <span id="mute-hover">Mute</span>
                <span id="mute"><i class="bi bi-bell"></i></span>
            </div>
            
            <h2>Focus</h2>
            <img src="img/img-focus.png" alt="Focus" id="img-focus">
            <img src="img/img-rest.png" alt="Rest" id="img-rest">
            <span id="time">4m00s</span>

            <div class="progress-bar">
                <div class="progress"></div>
                <div class="progress-time">
                    <p id="current-time">4:00</p>
                    <p>5:00</p>
                </div>
            </div>


            <div class="controls">

                <div class="div-switch">
                    <span id="switch-mode"><i class="bi bi-arrow-left-right"></i></span>
                    <span id="switch-mode-hover">Switch</span>
                </div>

                <div id="play-pause"><i class="bi bi-play-fill"></i></div>

                <div class="div-reset">
                    <span id="reset"><i class="bi bi-arrow-counterclockwise"></i></span>
                    <span id="reset-hover">Reset</span>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
